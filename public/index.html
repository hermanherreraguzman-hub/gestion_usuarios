<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - CRUD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gestión de Usuarios</h1>

        <!-- Formulario para agregar/editar -->
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" required>
                <span class="error" id="nombreError"></span>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
                <span class="error" id="emailError"></span>
            </div>
            <div class="form-group">
                <label for="edad">Edad:</label>
                <input type="number" id="edad" min="0" max="120">
                <span class="error" id="edadError"></span>
            </div>
            <button type="submit" id="submitBtn">Guardar Usuario</button>
            <button type="button" id="cancelBtn" class="cancel">Cancelar</button>
        </form>

        <!-- Tabla de usuarios -->
        <h2>Lista de Usuarios</h2>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Edad</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="usersList"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
